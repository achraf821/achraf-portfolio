<section id="resume">
  <h2 data-aos="fade-up">My <span>Resume</span></h2>
  <p class="subtitle" data-aos="fade-up">Download or view my resume to learn more about my experience</p>

  <div class="resume-container" data-aos="fade-up">
    <div class="resume-header">
      <div class="resume-info">
        <span class="resume-icon">📄</span>
        <div>
          <h3>Achraf Laazizi - Resume</h3>
          <p>Software Engineer · INSA Toulouse Graduate</p>
        </div>
      </div>
      <div class="resume-actions">
        <button (click)="togglePreview()">
          {{ showPreview ? 'Hide Resume' : 'Show Resume' }}
        </button>
        <a href="documents/Achraf Laazizi CV Anglais 26-06-2026.pdf" download>
          Download PDF
        </a>
        <a href="documents/Achraf Laazizi CV Anglais 26-06-2026.pdf" target="_blank">
          Open in New Tab
        </a>
      </div>
    </div>

    <div class="resume-preview" *ngIf="showPreview">
      <p class="preview-hint">Resume Preview — Download PDF for the full version</p>
      <iframe src="documents/Achraf Laazizi CV Anglais 26-06-2026.pdf"></iframe>
    </div>
  </div>
</section>
